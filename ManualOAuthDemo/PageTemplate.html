<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    body { background: white; color: black; font-family: "Times New Roman", serif; line-height: 1.4; margin: 2rem 1rem; }
    h1 { font-size: 1.5rem; }
    a { color: black; }
    .button { border: 1px solid black; display: inline-block; padding: .2rem .5rem; text-decoration: none; }
    .button:hover { background: black; color: white; }
    table { border-collapse: collapse; }
    td, th { border: 1px solid black; padding: .25rem; text-align: left; }
    code { border: 1px solid black; padding: 0 .15rem; }
  </style>
</head>
<body>
  <h1>{{title}}</h1>
  <hr>
  {{body}}
</body>
</html>
